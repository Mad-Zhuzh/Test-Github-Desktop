<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Официальный сайт пустоты</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html { font-size: clamp(14px, 2.5vw, 18px); }
    body {
      margin: 0;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: clamp(1.25rem, 5vw, 2.5rem);
      background: #000;
      color: #e8e8e8;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      text-align: center;
      line-height: 1.5;
    }
    h1 {
      margin: 0 0 clamp(1rem, 4vw, 1.75rem);
      font-size: clamp(1.75rem, 6vw, 3rem);
      font-weight: 600;
      letter-spacing: -0.02em;
      max-width: 20ch;
    }
    .tagline {
      margin: 0 0 clamp(2rem, 8vw, 3.5rem);
      font-size: clamp(1rem, 3vw, 1.25rem);
      color: #a0a0a0;
      max-width: 28ch;
    }
    button {
      appearance: none;
      margin: 0;
      padding: clamp(0.65rem, 2.5vw, 0.85rem) clamp(1.5rem, 6vw, 2.25rem);
      font: inherit;
      font-size: clamp(0.95rem, 2.5vw, 1.05rem);
      color: #000;
      background: #e8e8e8;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      transition: background 0.15s ease, transform 0.1s ease;
    }
    button:hover {
      background: #fff;
    }
    button:active {
      transform: scale(0.98);
    }
    button:focus-visible {
      outline: 2px solid #fff;
      outline-offset: 3px;
    }
    .footnote {
      margin-top: clamp(1rem, 4vw, 1.5rem);
      font-size: clamp(0.8rem, 2.2vw, 0.9rem);
      color: #666;
      max-width: 32ch;
    }
  </style>
</head>
<body>
  <h1>Официальный сайт пустоты</h1>
  <p class="tagline">Здесь был смысл. Он ушёл.</p>
  <button type="button">Нажать</button>
  <p class="footnote">Кнопка работает только морально</p>
</body>
</html>
