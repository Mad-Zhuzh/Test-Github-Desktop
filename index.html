<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Официальный сайт пустоты</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html { font-size: clamp(14px, 2.5vw, 18px); }
    body {
      margin: 0;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: clamp(3.125rem, 12.5vw, 6.25rem) clamp(1.25rem, 5vw, 2.5rem) clamp(1.25rem, 5vw, 2.5rem);
      background: #000;
      color: #e8e8e8;
      font-family: "Montserrat", sans-serif;
      text-align: center;
      line-height: 1.5;
    }
    h1 {
      margin: 0 0 clamp(calc(2rem / 1.5), calc(8vw / 1.5), calc(3.5rem / 1.5));
      font-family: "Courier New", Courier, monospace;
      font-size: clamp(1.4rem, 3.7vw + 0.7rem, 4.7rem);
      font-weight: 400;
      letter-spacing: 0;
      white-space: nowrap;
      max-width: 100%;
      overflow-x: auto;
      scrollbar-width: none;
    }
    h1::-webkit-scrollbar {
      display: none;
    }
    .tagline {
      margin: 0 0 clamp(calc(6rem / 1.75), calc(24vw / 1.75), calc(10.5rem / 1.75));
      font-size: clamp(0.9rem, 2.75vw, 1.1rem);
      color: #a0a0a0;
      max-width: 28ch;
    }
    .bottom-stack {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
      max-width: min(90vw, 26rem);
      /* Резервируем высоту «до» и «после» клика, чтобы заголовок и подпись не прыгали */
      min-height: clamp(11.5rem, 34vh, 15.5rem);
    }
    .action-zone {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      min-height: clamp(2.75rem, 10vw, 3.25rem);
    }
    button {
      appearance: none;
      margin: 0;
      padding: clamp(0.65rem, 2.5vw, 0.85rem) clamp(1.5rem, 6vw, 2.25rem);
      font: inherit;
      font-size: clamp(0.95rem, 2.5vw, 1.05rem);
      color: #000;
      background: #e8e8e8;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      transition: background 0.15s ease, transform 0.1s ease;
    }
    button:hover:not(:disabled) {
      background: #fff;
    }
    button:active:not(:disabled) {
      transform: scale(0.98);
    }
    button:focus-visible:not(:disabled) {
      outline: 2px solid #fff;
      outline-offset: 3px;
    }
    button.dissolving,
    .footnote.dissolving {
      animation: dissolve 0.75s ease-out forwards;
      pointer-events: none;
    }
    @keyframes dissolve {
      0% {
        opacity: 1;
        filter: blur(0);
      }
      100% {
        opacity: 0;
        filter: blur(12px);
      }
    }
    .result {
      margin: 0;
      width: 100%;
      padding: 0 0.5rem;
      font-size: clamp(1.08rem, 3.45vw, 1.3rem);
      color: #c8c8c8;
      opacity: 0;
      pointer-events: none;
    }
    .result.visible {
      animation: result-in 0.65s ease 0.05s forwards;
    }
    @keyframes result-in {
      from {
        opacity: 0;
        filter: blur(6px);
        letter-spacing: 0.15em;
      }
      to {
        opacity: 1;
        filter: blur(0);
        letter-spacing: normal;
      }
    }
    .footnote {
      margin-top: clamp(1rem, 4vw, 1.5rem);
      font-size: clamp(0.72rem, 2vw, 0.82rem);
      color: #666;
      max-width: 32ch;
    }
  </style>
</head>
<body>
  <h1>Официальный сайт пустоты</h1>
  <p class="tagline">Здесь был смысл. Он ушёл.</p>
  <div class="bottom-stack">
    <div class="action-zone">
      <button type="button" id="btn">Нажать</button>
      <p class="result" id="result" hidden aria-live="polite">Вжух! Ничего не произошло.</p>
    </div>
    <p class="footnote" id="footnote">Кнопка работает только морально</p>
  </div>
  <script>
    (function () {
      const btn = document.getElementById("btn");
      const result = document.getElementById("result");
      const footnote = document.getElementById("footnote");
      btn.addEventListener("click", function onClick() {
        btn.removeEventListener("click", onClick);
        btn.disabled = true;
        btn.classList.add("dissolving");
        footnote.classList.add("dissolving");
        btn.addEventListener(
          "animationend",
          function handleEnd() {
            btn.removeEventListener("animationend", handleEnd);
            btn.remove();
            footnote.remove();
            result.hidden = false;
            requestAnimationFrame(function () {
              result.classList.add("visible");
            });
          },
          { once: true }
        );
      });
    })();
  </script>
</body>
</html>
